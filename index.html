<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>샛별수산 거래장부</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1C3A4B">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="샛별수산">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F1E2;
    --paper-deep:#EFE7D2;
    --ink:#2B2A28;
    --navy:#1C3A4B;
    --navy-deep:#122733;
    --stamp:#BD3A2E;
    --green:#2F6B53;
    --rule:#C9BCA0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent;}
  body{min-height:100vh;padding-bottom:40px;}
  .wrap{max-width:480px;margin:0 auto;min-height:100vh;background:var(--paper);box-shadow:0 0 40px rgba(0,0,0,0.06);position:relative;}

  header.top{background:var(--navy);color:var(--paper);padding:22px 20px 18px;position:relative;overflow:hidden;}
  header.top::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;border:3px solid rgba(246,241,226,0.12);border-radius:50%;}
  .brand{font-family:'Noto Serif KR',serif;font-weight:900;font-size:22px;letter-spacing:0.5px;margin:0;}
  .brand span{color:#E7C77A;}
  .today-total{margin-top:14px;display:flex;align-items:baseline;gap:8px;}
  .today-total .label{font-size:12px;color:#9FB4BC;font-weight:700;letter-spacing:1px;}
  .today-total .num{font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:30px;font-variant-numeric:tabular-nums;}

  .date-pick-row{margin-top:6px;display:flex;align-items:center;gap:8px;}
  .date-input{background:rgba(246,241,226,0.12);border:1.5px solid rgba(246,241,226,0.35);border-radius:7px;color:var(--paper);font-size:13px;padding:5px 6px;font-family:'Noto Sans KR',sans-serif;}
  .date-input::-webkit-calendar-picker-indicator{filter:invert(0.9);}
  .date-label{font-size:13px;color:#C9D6DC;font-weight:500;}
  .today-btn{margin-left:auto;background:rgba(246,241,226,0.14);border:1.5px solid rgba(246,241,226,0.35);color:var(--paper);font-size:12px;font-weight:700;padding:5px 10px;border-radius:7px;cursor:pointer;}

  .confirm-overlay{position:fixed;inset:0;background:rgba(20,20,18,0.55);display:none;align-items:center;justify-content:center;z-index:100;padding:24px;}
  .confirm-overlay.show{display:flex;}
  .confirm-box{background:#fff;border-radius:14px;padding:22px 20px;max-width:340px;width:100%;box-shadow:0 12px 30px rgba(0,0,0,0.25);}
  .confirm-msg{font-size:15px;font-weight:700;color:var(--ink);line-height:1.5;margin-bottom:18px;text-align:center;}
  .confirm-actions{display:flex;gap:10px;}
  .confirm-actions button{flex:1;padding:12px;border-radius:9px;font-weight:900;font-size:15px;border:none;cursor:pointer;}
  .confirm-yes{background:var(--stamp);color:#fff;}
  .confirm-no{background:var(--paper-deep);color:var(--navy);border:1.5px solid var(--rule)!important;}

  nav.tabs{display:flex;background:var(--paper-deep);border-bottom:2px solid var(--rule);overflow-x:auto;}
  nav.tabs button{flex:1;padding:13px 4px;border:none;background:transparent;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:13.5px;color:#8a8068;cursor:pointer;position:relative;white-space:nowrap;}
  nav.tabs button.active{color:var(--navy);}
  nav.tabs button.active::after{content:"";position:absolute;bottom:-2px;left:18%;right:18%;height:3px;background:var(--stamp);border-radius:2px;}

  main{padding:18px 16px 30px;}
  .section-title{font-family:'Noto Serif KR',serif;font-weight:700;font-size:15px;color:var(--navy);margin:18px 0 10px 2px;display:flex;align-items:center;gap:8px;}
  .section-title:first-child{margin-top:0;}
  .section-title .count{font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:11px;background:var(--navy);color:var(--paper);padding:2px 7px;border-radius:20px;}
  .sub-note{font-size:12px;color:#9a9180;margin:-4px 0 12px 2px;line-height:1.5;}
  .search-input{width:100%;font-size:15px;padding:10px 12px;border:2px solid var(--rule);border-radius:9px;background:#fff;margin-bottom:10px;color:var(--ink);font-family:'Noto Sans KR',sans-serif;}
  .search-input:focus{outline:none;border-color:var(--navy);}

  .fav-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:6px;}
  .fav-btn{background:#fff;border:2px solid var(--rule);border-radius:12px;padding:14px 4px;font-weight:700;font-size:14px;color:var(--ink);cursor:pointer;text-align:center;min-height:58px;display:flex;align-items:center;justify-content:center;line-height:1.25;transition:transform .08s;}
  .fav-btn:active{transform:scale(0.96);background:var(--paper-deep);}
  .fav-btn.selected{background:var(--navy);color:var(--paper);border-color:var(--navy);}
  .more-link{display:block;text-align:center;padding:10px;font-size:13px;font-weight:700;color:var(--navy);background:none;border:none;width:100%;cursor:pointer;text-decoration:underline;}

  .entry-card{background:#fff;border:2px solid var(--navy);border-radius:14px;padding:16px;margin-bottom:18px;}
  .entry-card .ename{font-family:'Noto Serif KR',serif;font-weight:700;font-size:18px;color:var(--navy);margin-bottom:4px;}
  .entry-card .ebal{font-size:12px;color:var(--stamp);font-weight:700;margin-bottom:12px;}
  .item-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
  .item-btn{background:var(--paper);border:1.5px solid var(--rule);border-radius:10px;padding:10px 6px;font-weight:700;font-size:13px;cursor:pointer;text-align:center;line-height:1.3;}
  .item-btn .p{display:block;font-size:11px;font-weight:500;color:#8a8068;margin-top:2px;}
  .item-btn.selected{background:var(--navy);color:#fff;border-color:var(--navy);}
  .item-btn.selected .p{color:#C9D6DC;}
  .item-btn.noprice{border-style:dashed;}

  .cart-list{margin-bottom:4px;}
  .cart-line{padding:9px 0;border-bottom:1.5px dashed var(--rule);}
  .cart-line:last-child{border-bottom:none;}
  .cl-name{font-weight:700;font-size:14px;margin-bottom:6px;}
  .cl-flat-tag{font-size:10px;font-weight:700;color:var(--navy);background:var(--paper-deep);border-radius:5px;padding:2px 5px;margin-left:4px;}
  .cl-fields{display:flex;align-items:center;gap:6px;}
  .cl-fields input{width:0;flex:1;min-width:0;font-size:15px;font-weight:700;padding:8px 8px;border:2px solid var(--rule);border-radius:8px;background:var(--paper);font-variant-numeric:tabular-nums;color:var(--ink);}
  .cl-fields input:focus{outline:none;border-color:var(--navy);}
  .cl-x{color:#9a9180;font-weight:700;font-size:13px;}
  .cl-sub{min-width:62px;text-align:right;font-weight:900;font-size:13.5px;color:var(--navy);font-variant-numeric:tabular-nums;}
  .cl-del{background:none;border:none;color:#bbb3a0;font-size:18px;cursor:pointer;padding:0 2px;}

  .tx-group{margin-bottom:14px;border:1.5px solid var(--rule);border-radius:10px;overflow:hidden;background:#fff;}
  .tx-group-head{display:flex;justify-content:space-between;align-items:center;background:var(--paper-deep);padding:9px 12px;font-weight:700;font-size:14px;color:var(--navy);}
  .tx-group-head .tx-group-total{font-weight:900;font-variant-numeric:tabular-nums;}
  .tx-group-head .tx-group-total.credit{color:var(--stamp);}
  .tx-group-head .tx-group-total.paid{color:var(--green);}
  .tx-group .tx-row{padding:10px 12px;margin:0;}
  .tx-group .tx-row:last-child{border-bottom:none;}
  .addmore-btn{display:block;width:100%;background:none;border:none;border-bottom:1.5px dashed var(--rule);color:var(--navy);font-weight:700;font-size:12.5px;padding:9px 12px;cursor:pointer;text-align:left;}

  .statement{background:#fff;border:1.5px solid var(--rule);border-radius:12px;padding:18px 16px;margin-bottom:16px;}
  .st-head{text-align:center;border-bottom:2px solid var(--navy);padding-bottom:10px;margin-bottom:12px;}
  .st-shop{font-family:'Noto Serif KR',serif;font-weight:900;font-size:19px;color:var(--navy);}
  .st-shopsub{font-size:11.5px;color:#8a8068;margin-top:2px;}
  .st-bizinfo{font-size:10.5px;color:#9a9180;margin-top:6px;line-height:1.5;}
  .st-title{font-size:13px;font-weight:700;color:#7a7260;letter-spacing:2px;margin-top:8px;}
  .st-meta{display:flex;justify-content:space-between;font-size:13px;margin-bottom:12px;color:var(--ink);}
  .st-meta b{color:#7a7260;font-weight:700;margin-right:4px;}
  .st-table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:13px;}
  .st-table th{text-align:left;font-weight:700;color:#7a7260;border-bottom:1.5px solid var(--rule);padding:6px 4px;font-size:11.5px;}
  .st-table td{padding:7px 4px;border-bottom:1px dashed var(--rule);font-variant-numeric:tabular-nums;}
  .st-table .num{text-align:right;}
  .st-table .center{text-align:center;}
  .st-empty{text-align:center;color:#a59c89;padding:14px 0;}
  .st-rows{border-top:2px solid var(--navy);padding-top:8px;}
  .st-row{display:flex;justify-content:space-between;font-size:13.5px;padding:4px 0;}
  .st-row.sub{font-size:12px;color:#8a8068;padding-left:8px;}
  .st-row.sub.credit{color:var(--stamp);}
  .st-row.total{font-weight:900;font-size:15px;color:var(--stamp);border-top:1px dashed var(--rule);margin-top:4px;padding-top:8px;}
  .st-row.grand{font-weight:900;font-size:17px;color:var(--navy);border-top:2px solid var(--navy);margin-top:6px;padding-top:10px;}
  .st-bank{text-align:center;font-size:12.5px;font-weight:700;color:var(--navy);margin-top:16px;padding-top:12px;border-top:1.5px dashed var(--rule);}
  .st-message{margin-top:14px;padding:12px 14px;background:var(--paper-deep);border-radius:9px;font-size:13px;color:var(--ink);line-height:1.6;white-space:pre-wrap;}
  .msg-input{width:100%;min-height:64px;font-size:14px;padding:11px;border:2px solid var(--rule);border-radius:9px;background:#fff;font-family:'Noto Sans KR',sans-serif;resize:vertical;margin-bottom:6px;color:var(--ink);}
  .st-foot{text-align:center;font-size:11px;color:#9a9180;margin-top:14px;}
  .share-btn{background:var(--navy);margin-top:8px;}

  .period-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:8px;}
  .period-btn{background:#fff;border:1.5px solid var(--rule);border-radius:9px;padding:9px 4px;font-weight:700;font-size:12.5px;color:var(--ink);cursor:pointer;}
  .period-btn.selected{background:var(--navy);color:#fff;border-color:var(--navy);}
  .custom-range-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .custom-range-row input{flex:1;font-size:13.5px;padding:8px;border:2px solid var(--rule);border-radius:8px;background:#fff;}
  .custom-range-row span{color:#9a9180;font-weight:700;}
  .view-toggle{display:flex;gap:8px;margin:4px 0 16px;}
  .view-toggle button{flex:1;background:var(--paper-deep);border:1.5px solid var(--rule);border-radius:9px;padding:10px 4px;font-weight:700;font-size:13px;color:#7a7260;cursor:pointer;}
  .view-toggle button.active{background:var(--navy);color:#fff;border-color:var(--navy);}

  @media print{
    body{background:#fff;}
    .no-print{display:none!important;}
    nav.tabs, header.top, .fab{display:none!important;}
    .wrap{box-shadow:none;max-width:100%;}
    main{padding:0;}
    .statement{border:none;padding:0;margin:0;}
  }

  .field-row{display:flex;gap:10px;margin-bottom:10px;}
  .field{flex:1;}
  .field label{display:block;font-size:11.5px;font-weight:700;color:#7a7260;margin-bottom:4px;}
  .field input{width:100%;font-size:20px;font-weight:700;padding:10px 10px;border:2px solid var(--rule);border-radius:8px;font-variant-numeric:tabular-nums;background:var(--paper);color:var(--ink);}
  .field input:focus{outline:none;border-color:var(--navy);}
  .field .hint{font-size:11px;color:#9a9180;margin-top:3px;}
  .pay-toggle{display:flex;gap:8px;margin-bottom:12px;}
  .pay-toggle button{flex:1;padding:10px;border-radius:8px;border:2px solid var(--rule);background:#fff;font-weight:700;font-size:13.5px;color:#7a7260;cursor:pointer;}
  .pay-toggle button.active{border-color:var(--green);color:var(--green);background:#EAF3EE;}
  .pay-toggle button.active.credit{border-color:var(--stamp);color:var(--stamp);background:#FBEAE7;}
  .method-toggle{display:flex;gap:8px;margin-bottom:12px;}
  .method-toggle button{flex:1;padding:8px;border-radius:7px;border:1.5px solid var(--rule);background:#fff;font-weight:700;font-size:12.5px;color:#9a9180;cursor:pointer;}
  .method-toggle button.active{border-color:var(--navy);color:var(--navy);background:var(--paper-deep);}
  .sum-line{display:flex;justify-content:space-between;align-items:center;padding:10px 2px;border-top:1.5px dashed var(--rule);margin-bottom:12px;}
  .sum-line .l{font-weight:700;color:#7a7260;font-size:13px;}
  .sum-line .v{font-weight:900;font-size:24px;color:var(--navy);font-variant-numeric:tabular-nums;}
  .btn-main{width:100%;background:var(--stamp);color:#fff;border:none;border-radius:10px;padding:15px;font-size:16px;font-weight:900;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
  .btn-main:active{opacity:0.85;}
  .btn-main:disabled{background:#d8cfb6;cursor:not-allowed;}
  .btn-ghost{width:100%;background:none;border:none;padding:10px;color:#9a9180;font-weight:700;font-size:13px;cursor:pointer;margin-top:4px;}

  .tx-row{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:4px 10px;padding:12px 4px;border-bottom:1.5px dashed var(--rule);}
  .tx-row .name{font-weight:700;font-size:14.5px;flex:1 1 60%;}
  .tx-row .detail{font-size:12px;color:#8a8068;flex:1 1 100%;}
  .tx-row .right{display:flex;align-items:center;gap:8px;}
  .tx-row .total{font-weight:900;font-size:16px;font-variant-numeric:tabular-nums;}
  .tx-row .total.credit{color:var(--stamp);}
  .tx-row .total.paid{color:var(--green);}
  .tx-row .edit{background:none;border:1.5px solid var(--rule);border-radius:6px;color:var(--navy);font-size:11.5px;font-weight:700;padding:5px 8px;cursor:pointer;white-space:nowrap;}
  .tx-row .del{background:none;border:1.5px solid var(--rule);border-radius:50%;color:#9a9180;font-size:16px;line-height:1;width:26px;height:26px;cursor:pointer;padding:0;margin-left:14px;}

  .tx-edit{width:100%;background:var(--paper-deep);border:2px solid var(--navy);border-radius:10px;padding:12px;margin:2px 0;}
  .tx-edit-name{font-weight:700;font-size:14.5px;color:var(--navy);margin-bottom:8px;}
  .tx-edit-actions{display:flex;gap:8px;margin-top:4px;}
  .tx-edit-actions .btn-main{flex:1;width:auto;padding:11px;}
  .tx-edit-actions .btn-ghost{width:auto;flex:0 0 auto;background:#fff;border:1.5px solid var(--rule);border-radius:8px;padding:11px 16px;color:#9a9180;margin-top:0;margin-left:14px;}
  .empty{text-align:center;color:#a59c89;font-size:13.5px;padding:30px 10px;line-height:1.6;}

  .client-row{background:#fff;border:1.5px solid var(--rule);border-radius:10px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .client-row .cname{font-weight:700;font-size:15px;}
  .client-row .ctag{font-size:11px;color:#9a9180;margin-top:2px;}
  .client-row .ctag.has-bal{color:var(--stamp);font-weight:700;}
  .star{background:none;border:none;font-size:20px;cursor:pointer;color:#d8cfb6;}
  .star.on{color:#E7A23A;}
  .icon-btn{background:none;border:none;font-size:16px;color:#b0a890;cursor:pointer;padding:4px 6px;}

  .add-form{background:#fff;border:2px dashed var(--navy);border-radius:12px;padding:14px;margin-bottom:16px;}
  .add-form input[type=text], .add-form input[type=number]{width:100%;font-size:16px;padding:11px;border:2px solid var(--rule);border-radius:8px;margin-bottom:10px;background:var(--paper);font-variant-numeric:tabular-nums;}
  .add-form .row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:13.5px;font-weight:700;color:#7a7260;}

  .item-row{background:#fff;border:1.5px solid var(--rule);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
  .item-row .top-line{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px;}
  .order-btns{display:flex;flex-direction:column;gap:2px;flex:0 0 auto;}
  .order-btn{background:var(--paper-deep);border:1.5px solid var(--rule);border-radius:5px;color:var(--navy);font-size:10px;line-height:1;width:24px;height:18px;cursor:pointer;padding:0;}
  .order-btn:disabled{opacity:0.3;cursor:default;}
  .item-row .iname-input{flex:1;font-weight:700;font-size:15px;border:2px solid transparent;border-radius:6px;padding:5px 6px;background:transparent;color:var(--ink);font-family:'Noto Sans KR',sans-serif;}
  .item-row .iname-input:focus{outline:none;border-color:var(--navy);background:var(--paper);}
  .item-row .istatus{font-size:11px;color:#9a9180;margin-bottom:8px;}
  .item-row .istatus.fresh{color:var(--green);font-weight:700;}
  .item-price-row{display:flex;gap:8px;align-items:center;}
  .item-price-row input{flex:1;font-size:18px;font-weight:700;padding:9px 10px;border:2px solid var(--rule);border-radius:8px;background:var(--paper);font-variant-numeric:tabular-nums;}
  .item-price-row .same-btn{background:var(--paper-deep);border:1.5px solid var(--rule);border-radius:8px;padding:9px 10px;font-size:12px;font-weight:700;color:var(--navy);cursor:pointer;white-space:nowrap;}

  .balance-row{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;border-left:5px solid var(--stamp);position:relative;overflow:hidden;}
  .balance-row .bname{font-weight:700;font-size:15.5px;}
  .balance-row .bamt{font-weight:900;font-size:21px;color:var(--stamp);font-variant-numeric:tabular-nums;margin-top:2px;}
  .adjust-row{display:flex;gap:8px;margin-top:10px;}
  .adjust-row input{flex:1;font-size:15px;font-weight:700;padding:9px 10px;border:2px solid var(--rule);border-radius:8px;background:var(--paper);}
  .adjust-row button{background:var(--green);color:#fff;border:none;border-radius:8px;padding:9px 12px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .balance-row .settle{margin-top:8px;width:100%;background:var(--paper-deep);border:1.5px solid var(--rule);color:var(--navy);font-weight:700;font-size:13px;padding:9px;border-radius:8px;cursor:pointer;}
  .stamp-mark{position:absolute;right:14px;top:14px;width:54px;height:54px;border:3px solid var(--stamp);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif KR',serif;font-weight:900;color:var(--stamp);font-size:16px;transform:scale(0) rotate(-15deg);opacity:0;pointer-events:none;}
  .stamp-mark.show{animation:stampIn .45s ease-out forwards;}
  @keyframes stampIn{0%{transform:scale(2.2) rotate(-15deg);opacity:0;}60%{transform:scale(0.85) rotate(-15deg);opacity:1;}100%{transform:scale(1) rotate(-15deg);opacity:1;}}
  .total-out{text-align:center;padding:14px;margin-bottom:14px;background:var(--navy);border-radius:12px;color:var(--paper);}
  .total-out .l{font-size:12px;color:#9FB4BC;font-weight:700;}

  .payment-row{background:#fff;border:1.5px solid var(--rule);border-radius:10px;padding:11px 13px;margin-bottom:8px;}
  .pmt-top{display:flex;justify-content:space-between;align-items:center;}
  .pmt-name{font-weight:700;font-size:14.5px;}
  .pmt-amt{font-weight:900;font-size:15.5px;color:var(--green);font-variant-numeric:tabular-nums;}
  .pmt-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
  .pmt-meta{font-size:11.5px;color:#9a9180;}
  .pmt-undo{background:none;border:1.5px solid var(--rule);border-radius:7px;color:var(--stamp);font-size:11.5px;font-weight:700;padding:5px 9px;cursor:pointer;}
  .total-out .v{font-size:26px;font-weight:900;font-variant-numeric:tabular-nums;}

  .fab{position:fixed;bottom:22px;right:calc(50% - 240px + 18px);max-width:480px;background:var(--navy);color:#fff;border:none;width:54px;height:54px;border-radius:50%;font-size:26px;box-shadow:0 6px 16px rgba(28,58,75,0.4);cursor:pointer;z-index:10;}
  @media (max-width:520px){.fab{right:18px;}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <p class="brand">샛별<span>수산</span> 거래장부</p>
    <div class="date-pick-row">
      <input type="date" id="workDateInput" class="date-input">
      <span class="date-label" id="dateRow"></span>
      <button class="today-btn" id="gotoTodayBtn">오늘</button>
    </div>
    <div class="today-total">
      <span class="label">선택일 합계</span>
      <span class="num" id="todayTotalNum">0원</span>
    </div>
  </header>

  <nav class="tabs">
    <button data-tab="today" class="active">오늘 거래</button>
    <button data-tab="prices">품목·시세</button>
    <button data-tab="clients">거래처</button>
    <button data-tab="balance">미수금</button>
    <button data-tab="statement">명세서</button>
  </nav>

  <main id="main"></main>
  <button class="fab" id="fabAdd" title="추가">＋</button>
</div>

<div id="confirmOverlay" class="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button class="confirm-yes" id="confirmYes">예</button>
      <button class="confirm-no" id="confirmNo">아니요</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const STORAGE_KEY = 'saetbyeol-ledger-data';
// state.clients: [{id,name,favorite,balance}]
// state.items: [{id,name,price,priceDate}]
// state.tx: { 'YYYY-MM-DD': [{id,clientId,itemId,price,qty,total,paid}] }
let state = { clients: [], items: [], tx: {}, payments: [], clientMessages: {} };
let activeTab = 'today';
let selectedClientId = null;
let showAllClients = false;
let cart = []; // [{itemId, price, qty}] - 한 거래처에 한 번에 등록할 품목 목록
let cartPayMode = 'credit';
let cartPayMethod = 'cash';
let selectedStatementClientId = null;
let statementPeriod = '1w'; // '1w','1m','3m','6m','1y','custom'
let statementCustomStart = null;
let statementCustomEnd = null;
let statementView = 'client'; // 'client' | 'summary'
let editingTxId = null;
let balanceMethod = {}; // clientId -> 'cash' | 'card' (미수금 탭에서 입금/정산 시 선택)
let clientsTabSearch = '';
let todayClientSearch = '';
let todayItemSearch = '';
let balanceTabSearch = '';
function preserveFocusRender(){
  const active = document.activeElement;
  const id = active && active.id;
  const selStart = (active && typeof active.selectionStart==='number') ? active.selectionStart : null;
  const selEnd = (active && typeof active.selectionEnd==='number') ? active.selectionEnd : null;
  render();
  if(id){
    const el = document.getElementById(id);
    if(el){
      el.focus();
      if(selStart!=null && el.setSelectionRange){ try{ el.setSelectionRange(selStart, selEnd); }catch(e){} }
    }
  }
}
function cartTotal(){ return cart.reduce((s,l)=> s + (l.flat ? (Number(l.price)||0) : (Number(l.price)||0)*(Math.round((Number(l.qty)||0)*10)/10)), 0); }

function realTodayKey(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
let workingDate = realTodayKey(); // 거래를 등록/조회할 기준 날짜 (선택 가능)
function dateLabel(dateStr){
  const [y,m,dd] = dateStr.split('-').map(Number);
  const d = new Date(y, m-1, dd);
  const days=['일','월','화','수','목','금','토'];
  return `${m}월 ${dd}일 (${days[d.getDay()]})`;
}
function won(n){ return Math.round(Number(n||0)).toLocaleString('ko-KR') + '원'; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function showConfirm(message){
  return new Promise(resolve=>{
    const overlay = document.getElementById('confirmOverlay');
    document.getElementById('confirmMsg').textContent = message;
    overlay.classList.add('show');
    const yesBtn = document.getElementById('confirmYes');
    const noBtn = document.getElementById('confirmNo');
    function cleanup(val){
      overlay.classList.remove('show');
      yesBtn.removeEventListener('click', onYes);
      noBtn.removeEventListener('click', onNo);
      resolve(val);
    }
    function onYes(){ cleanup(true); }
    function onNo(){ cleanup(false); }
    yesBtn.addEventListener('click', onYes);
    noBtn.addEventListener('click', onNo);
  });
}

async function loadState(){
  try{
    if(window.storage){
      const res = await window.storage.get(STORAGE_KEY, false);
      if(res && res.value){ state = JSON.parse(res.value); }
    } else {
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){ state = JSON.parse(raw); }
    }
  }catch(e){ /* 첫 사용: 데이터 없음 */ }
  if(!state.clients) state.clients = [];
  if(!state.items) state.items = [];
  if(!state.tx) state.tx = {};
  if(!state.payments) state.payments = [];
  if(!state.clientMessages) state.clientMessages = {};
  state.items.forEach(it=>{
    if((it.name==='공임' || it.name==='운임') && !it.flatRate) it.flatRate = true;
  });
}
async function saveState(){
  try{
    if(window.storage){ await window.storage.set(STORAGE_KEY, JSON.stringify(state), false); }
    else { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  }
  catch(e){ console.error('저장 실패', e); }
}

function getClient(id){ return state.clients.find(c=>c.id===id); }
function getItem(id){ return state.items.find(i=>i.id===id); }
function todayTx(){ return state.tx[workingDate] || []; }
function setTodayTx(list){ state.tx[workingDate] = list; }
function totalBalance(){ return state.clients.reduce((s,c)=>s+(c.balance||0),0); }
function itemHasTodayPrice(it){ return it.priceDate === workingDate && it.price>0; }

function render(){
  document.getElementById('workDateInput').value = workingDate;
  document.getElementById('dateRow').textContent = dateLabel(workingDate);
  const tt = todayTx().reduce((s,t)=>s+t.total,0);
  document.getElementById('todayTotalNum').textContent = won(tt);
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active', b.dataset.tab===activeTab));

  const main = document.getElementById('main');
  if(activeTab==='today') main.innerHTML = renderToday();
  else if(activeTab==='prices') main.innerHTML = renderPrices();
  else if(activeTab==='clients') main.innerHTML = renderClients();
  else if(activeTab==='balance') main.innerHTML = renderBalance();
  else main.innerHTML = renderStatement();

  attachHandlers();
}

function renderToday(){
  const favs = state.clients.filter(c=>c.favorite);
  const rest = state.clients.filter(c=>!c.favorite);
  const baseList = showAllClients ? state.clients : favs;
  const list = todayClientSearch ? baseList.filter(c=>c.name.includes(todayClientSearch)) : baseList;

  let html = '';
  if(state.clients.length===0){
    html += `<div class="empty">아직 등록된 거래처가 없습니다.<br>오른쪽 아래 ＋ 버튼으로 거래처를 먼저 추가해주세요.</div>`;
  } else {
    html += `<div class="section-title">거래처 선택 <span class="count">${list.length}</span></div>`;
    html += `<input type="text" class="search-input" id="todayClientSearchInput" placeholder="거래처 검색" value="${todayClientSearch}">`;
    if(list.length===0){
      html += `<div class="empty">'${todayClientSearch}'와 일치하는 거래처가 없습니다.</div>`;
    } else {
      html += `<div class="fav-grid">`;
      list.forEach(c=>{
        html += `<button class="fav-btn ${c.id===selectedClientId?'selected':''}" data-client="${c.id}">${c.name}</button>`;
      });
      html += `</div>`;
    }
    if(!showAllClients && rest.length>0){
      html += `<button class="more-link" id="showAllBtn">전체 거래처 더보기 (${rest.length}곳)</button>`;
    } else if(showAllClients && rest.length>0){
      html += `<button class="more-link" id="hideAllBtn">자주 거래처만 보기</button>`;
    }
  }

  if(selectedClientId){
    const c = getClient(selectedClientId);
    if(c){
      html += `<div class="entry-card">
        <div class="ename">${c.name}</div>
        ${c.balance>0?`<div class="ebal">현재 미수금 ${won(c.balance)}</div>`:''}
        ${todayTx().some(t=>t.clientId===c.id)?`<div class="ebal" style="color:var(--green);">오늘 등록된 거래가 있습니다. 추가 주문 품목만 담아서 등록하면 아래 내역에 함께 합쳐집니다.</div>`:''}`;

      if(state.items.length===0){
        html += `<div class="empty">등록된 품목이 없습니다. '품목·시세' 탭에서 먼저 품목을 추가해주세요.</div></div>`;
      } else {
        html += `<div class="sub-note" style="margin:0 0 8px 2px;">품목을 눌러 담으세요. 여러 개를 한 번에 담을 수 있어요. 단가에 마이너스(-)를 붙이면 그만큼 할인됩니다.</div>`;
        html += `<input type="text" class="search-input" id="todayItemSearchInput" placeholder="품목 검색" value="${todayItemSearch}">`;
        const filteredItems = todayItemSearch ? state.items.filter(it=>it.name.includes(todayItemSearch)) : state.items;
        html += `<div class="item-grid">`;
        if(filteredItems.length===0){
          html += `<div class="empty">'${todayItemSearch}'와 일치하는 품목이 없습니다.</div>`;
        }
        filteredItems.forEach(it=>{
          const has = itemHasTodayPrice(it);
          const inCart = cart.some(l=>l.itemId===it.id);
          const priceLabel = has ? (it.flatRate ? won(it.price) : won(it.price)+'/kg') : '시세 미입력';
          html += `<button class="item-btn ${inCart?'selected':''} ${has?'':'noprice'}" data-item="${it.id}">${it.name}<span class="p">${priceLabel}</span></button>`;
        });
        html += `</div>`;

        if(cart.length>0){
          html += `<div class="cart-list">`;
          cart.forEach((line,idx)=>{
            const it = getItem(line.itemId);
            const isFlat = !!line.flat;
            const sub = isFlat ? (Number(line.price)||0) : (Number(line.price)||0)*(Number(line.qty)||0);
            html += `
            <div class="cart-line">
              <div class="cl-name">${it?it.name:''}${isFlat?' <span class="cl-flat-tag">고정가</span>':''}</div>
              <div class="cl-fields">
                <input type="number" inputmode="numeric" class="cl-price" data-cartidx="${idx}" placeholder="${isFlat?'가격':'단가/kg'}" value="${line.price||''}">
                ${isFlat?'':`<span class="cl-x">×</span><input type="number" inputmode="decimal" step="0.1" class="cl-qty" data-cartidx="${idx}" placeholder="kg" value="${line.qty||''}">`}
                <span class="cl-sub">${won(sub)}</span>
                <button class="cl-del" data-cartdel="${idx}">×</button>
              </div>
            </div>`;
          });
          html += `</div>`;
          html += `
          <div class="pay-toggle">
            <button id="payCredit" class="credit ${cartPayMode==='credit'?'active':''}">외상(미수금)</button>
            <button id="payCash" class="${cartPayMode==='cash'?'active':''}">즉시 결제</button>
          </div>
          ${cartPayMode==='cash'?`
          <div class="method-toggle">
            <button id="methodCash" class="${cartPayMethod==='cash'?'active':''}" data-method="cash">현금</button>
            <button id="methodCard" class="${cartPayMethod==='card'?'active':''}" data-method="card">카드</button>
          </div>`:''}
          <div class="sum-line"><span class="l">합계 (${cart.length}개 품목)</span><span class="v" id="sumPreview">${won(cartTotal())}</span></div>
          <button class="btn-main" id="addTxBtn">거래 등록</button>`;
        }
        html += `</div>`;
      }
    }
  }

  html += `<div class="section-title">오늘의 거래 내역</div>`;
  const txs = todayTx();
  if(txs.length===0){
    html += `<div class="empty">아직 등록된 거래가 없습니다.</div>`;
  } else {
    const groups = [];
    const seen = {};
    txs.slice().reverse().forEach(t=>{
      const gid = t.clientId;
      if(!seen[gid]){ seen[gid] = { clientId:t.clientId, items:[] }; groups.push(seen[gid]); }
      seen[gid].items.push(t);
    });
    groups.forEach(g=>{
      const cl = getClient(g.clientId);
      const groupTotal = g.items.reduce((s,t)=>s+t.total,0);
      const allPaid = g.items.every(t=>t.paid);
      const allCredit = g.items.every(t=>!t.paid);
      const totalClass = allPaid ? 'paid' : (allCredit ? 'credit' : '');
      html += `<div class="tx-group">`;
      html += `<div class="tx-group-head"><span>${cl?cl.name:'(삭제된 거래처)'}</span><span class="tx-group-total ${totalClass}">${won(groupTotal)}</span></div>`;
      if(cl){
        html += `<button class="addmore-btn" data-addmore="${cl.id}">＋ 추가 주문 담기</button>`;
      }
      g.items.forEach(t=>{
        const it = getItem(t.itemId);
        if(t.id===editingTxId){
          html += `
          <div class="tx-edit">
            <div class="tx-edit-name">${it?it.name:'(삭제된 품목)'} 수정</div>
            <div class="field-row">
              <div class="field"><label>${t.flat?'가격 (원)':'단가 (원/kg)'}</label><input type="number" inputmode="numeric" id="editPrice" value="${t.price}"></div>
              ${t.flat?'':`<div class="field"><label>수량 (kg)</label><input type="number" inputmode="decimal" step="0.1" id="editQty" value="${t.qty}"></div>`}
            </div>
            <div class="pay-toggle">
              <button id="editPayCredit" class="credit ${!t.paid?'active':''}">외상(미수금)</button>
              <button id="editPayCash" class="${t.paid?'active':''}">즉시 결제</button>
            </div>
            ${`
            <div class="method-toggle" id="editMethodToggle" style="display:${t.paid?'flex':'none'};">
              <button id="editMethodCash" class="${(t.payMethod||'cash')==='cash'?'active':''}" data-emethod="cash">현금</button>
              <button id="editMethodCard" class="${t.payMethod==='card'?'active':''}" data-emethod="card">카드</button>
            </div>`}
            <div class="tx-edit-actions">
              <button class="btn-main" id="editSave">저장</button>
              <button class="btn-ghost" id="editCancel">취소</button>
            </div>
          </div>`;
        } else {
          html += `
          <div class="tx-row">
            <div class="name">${it?it.name:'(삭제된 품목)'}</div>
            <div class="detail">${t.flat? '고정 가격' : `${won(t.price)}/kg × ${t.qty}kg`}${t.paid&&t.payMethod?' · '+(t.payMethod==='card'?'카드':'현금'):''}</div>
            <div class="right">
              <span class="total ${t.paid?'paid':'credit'}">${won(t.total)}</span>
              <button class="edit" data-editopen="${t.id}">수정</button>
              <button class="del" data-deltx="${t.id}">×</button>
            </div>
          </div>`;
        }
      });
      html += `</div>`;
    });
  }
  return html;
}

function renderPrices(){
  let html = `
  <div class="add-form" id="addItemForm" style="display:${state._showAddItem?'block':'none'}">
    <input type="text" id="newItemName" placeholder="품목 이름 (예: 자연산 광어)">
    <input type="number" inputmode="numeric" id="newItemPrice" placeholder="오늘 단가 · 모르면 비워두세요">
    <div class="row"><input type="checkbox" id="newItemFlat" style="width:18px;height:18px;"> 고정 가격 품목 (kg당 단가 아님 · 공임, 운임 등)</div>
    <button class="btn-main" id="saveItemBtn">품목·시세 저장</button>
  </div>
  <div class="section-title">오늘의 시세 입력 <span class="count">${state.items.length}</span></div>
  <div class="sub-note">한 번 입력해두면 '오늘 거래'에서 해당 품목을 고를 때 자동으로 채워집니다. 거래 중에도 언제든 바로 수정할 수 있어요.</div>`;

  if(state.items.length===0){
    html += `<div class="empty">＋ 버튼으로 품목을 먼저 등록해주세요.<br>예: 양식광어, 자연산광어, 보리숭어, 농어 등</div>`;
  } else {
    state.items.forEach((it,idx)=>{
      const fresh = itemHasTodayPrice(it);
      html += `
      <div class="item-row">
        <div class="top-line">
          <div class="order-btns">
            <button class="order-btn" data-moveup="${it.id}" ${idx===0?'disabled':''}>▲</button>
            <button class="order-btn" data-movedown="${it.id}" ${idx===state.items.length-1?'disabled':''}>▼</button>
          </div>
          <input type="text" class="iname-input" data-nameitem="${it.id}" value="${it.name}">
          <button class="icon-btn" data-delitem="${it.id}">삭제</button>
        </div>
        <div class="istatus ${fresh?'fresh':''}">${it.flatRate?'고정 가격 · ':''}${fresh? '오늘 시세 입력됨' : (it.price? '어제 '+won(it.price)+' · 오늘 미입력' : '시세 미입력')}</div>
        <div class="item-price-row">
          <input type="number" inputmode="numeric" placeholder="${it.flatRate?'오늘 가격 (원)':'오늘 단가 (원/kg)'}" value="${fresh?it.price:''}" data-priceitem="${it.id}">
          ${(!fresh && it.price)?`<button class="same-btn" data-samebtn="${it.id}">어제와 동일</button>`:''}
        </div>
      </div>`;
    });
  }
  return html;
}

function renderClients(){
  let html = `
  <div class="add-form" id="addClientForm" style="display:${state._showAddForm?'block':'none'}">
    <input type="text" id="newClientName" placeholder="거래처 이름 (예: 할매수산)">
    <div class="row"><input type="checkbox" id="newClientFav" checked style="width:18px;height:18px;"> 자주 거래하는 곳으로 등록</div>
    <button class="btn-main" id="saveClientBtn">거래처 저장</button>
  </div>
  <div class="section-title">전체 거래처 <span class="count">${state.clients.length}</span></div>`;

  if(state.clients.length===0){
    html += `<div class="empty">＋ 버튼을 눌러 첫 거래처를 등록해보세요.</div>`;
  } else {
    html += `<input type="text" class="search-input" id="clientsSearchInput" placeholder="거래처 검색" value="${clientsTabSearch}">`;
    const sorted = state.clients.slice().sort((a,b)=> (b.favorite-a.favorite));
    const filtered = clientsTabSearch ? sorted.filter(c=>c.name.includes(clientsTabSearch)) : sorted;
    if(filtered.length===0){
      html += `<div class="empty">'${clientsTabSearch}'와 일치하는 거래처가 없습니다.</div>`;
    }
    filtered.forEach(c=>{
      html += `
      <div class="client-row">
        <button class="star ${c.favorite?'on':''}" data-fav="${c.id}">★</button>
        <div style="flex:1;">
          <div class="cname">${c.name}</div>
          <div class="ctag ${c.balance>0?'has-bal':''}">${c.favorite?'자주 거래':'가끔 거래'}${c.balance>0?` · 미수금 ${won(c.balance)}`:' · 미수금 없음'}</div>
        </div>
        <button class="icon-btn" data-delclient="${c.id}">삭제</button>
      </div>`;
    });
  }

  html += `
  <div class="section-title">데이터 백업</div>
  <div class="sub-note">전체 거래처·품목·거래 기록을 파일 하나로 저장합니다. 저장할 때 나오는 화면에서 '파일에 저장' → iCloud Drive를 고르거나, 구글 드라이브 앱으로 보내면 그 안에 안전하게 보관됩니다.</div>
  <button class="btn-main" id="backupBtn">백업 파일 만들기 (저장/공유)</button>
  <button class="btn-ghost" id="restoreBtn" style="text-decoration:underline;">백업 파일에서 복원하기</button>
  <input type="file" id="restoreFileInput" accept="application/json" style="display:none;">`;
  return html;
}

function renderBalance(){
  const withBalance = state.clients.filter(c=>c.balance>0).sort((a,b)=>b.balance-a.balance);
  let html = `<div class="total-out"><div class="l">전체 미수금 합계</div><div class="v">${won(totalBalance())}</div></div>`;
  if(withBalance.length===0){

function periodLabel(period){
  return { 'today':'오늘', '1w':'1주일', '1m':'1개월', '3m':'3개월', '6m':'6개월', '1y':'1년', 'custom':'기간설정' }[period] || '';
}
function periodToRange(period){
  const end = realTodayKey();
  if(period==='today'){
    return [end, end];
  }
  if(period==='custom'){
    return [statementCustomStart || end, statementCustomEnd || end];
  }
  const d = new Date();
  if(period==='1w') d.setDate(d.getDate()-6);
  else if(period==='1m') d.setMonth(d.getMonth()-1);
  else if(period==='3m') d.setMonth(d.getMonth()-3);
  else if(period==='6m') d.setMonth(d.getMonth()-6);
  else if(period==='1y') d.setFullYear(d.getFullYear()-1);
  const start = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  return [start, end];
}
function txInRange(start, end, clientId){
  const out = [];
  Object.keys(state.tx).forEach(dateKey=>{
    if(dateKey>=start && dateKey<=end){
      (state.tx[dateKey]||[]).forEach(t=>{
        if(!clientId || t.clientId===clientId){ out.push(Object.assign({date:dateKey}, t)); }
      });
    }
  });
  out.sort((a,b)=> a.date<b.date?-1:(a.date>b.date?1:0));
  return out;
}
function paymentsInRange(start, end, clientId){
  return (state.payments||[]).filter(p=> p.date>=start && p.date<=end && (!clientId || p.clientId===clientId));
}

}

      const editMethodCard = document.getElementById('editMethodCard');
      editPayCash?.addEventListener('click', ()=>{
        editPayMode='cash'; editPayCash.classList.add('active'); editPayCredit.classList.remove('active');
        if(editMethodToggle) editMethodToggle.style.display='flex';
      });
      editPayCredit?.addEventListener('click', ()=>{
        editPayMode='credit'; editPayCredit.classList.add('active'); editPayCash.classList.remove('active');
        if(editMethodToggle) editMethodToggle.style.display='none';
      });
      editMethodCash?.addEventListener('click', ()=>{ editPayMethod='cash'; editMethodCash.classList.add('active'); editMethodCard.classList.remove('active'); });
      editMethodCard?.addEventListener('click', ()=>{ editPayMethod='card'; editMethodCard.classList.add('active'); editMethodCash.classList.remove('active'); });

      document.getElementById('editSave')?.addEventListener('click', async ()=>{
        const list = todayTx();
        const t = list.find(x=>x.id===editingTxId);
        if(!t) return;
        const newPrice = Number(document.getElementById('editPrice').value||0);
        const newQty = t.flat ? 1 : Math.round(Number(document.getElementById('editQty').value||0)*10)/10;
        if(newPrice===0 || (!t.flat && newQty<=0)){ alert('단가와 수량을 입력해주세요.'); return; }
        const newPaid = editPayMode==='cash';
        const newTotal = t.flat ? Math.round(newPrice) : Math.round(newPrice*newQty);
        const c = getClient(t.clientId);
        if(c){
          if(!t.paid) c.balance = Math.max(0,(c.balance||0)-t.total);
          if(!newPaid) c.balance = (c.balance||0) + newTotal;
        }
        t.price = newPrice; t.qty = newQty; t.total = newTotal; t.paid = newPaid; t.payMethod = newPaid ? editPayMethod : null;
        setTodayTx(list);
        // 품목의 기본(오늘) 시세는 그대로 두고, 이 거래(이 거래처)에만 단가를 반영
        editingTxId = null;
        await saveState(); render();
      });
    }
  }

  if(activeTab==='prices'){
    document.querySelectorAll('[data-moveup]').forEach(b=>{
      b.onclick = async ()=>{
        const idx = state.items.findIndex(i=>i.id===b.dataset.moveup);
        if(idx>0){
          const tmp = state.items[idx-1];
          state.items[idx-1] = state.items[idx];
          state.items[idx] = tmp;
          await saveState(); render();
        }
      };
    });
    document.querySelectorAll('[data-movedown]').forEach(b=>{
      b.onclick = async ()=>{
        const idx = state.items.findIndex(i=>i.id===b.dataset.movedown);
        if(idx>-1 && idx<state.items.length-1){
          const tmp = state.items[idx+1];
          state.items[idx+1] = state.items[idx];
          state.items[idx] = tmp;
          await saveState(); render();
        }
      };
    });
    document.getElementById('saveItemBtn')?.addEventListener('click', async ()=>{
      const nameEl = document.getElementById('newItemName');
      const priceEl = document.getElementById('newItemPrice');
      const flatEl = document.getElementById('newItemFlat');
      const name = nameEl.value.trim();
      if(!name){ alert('품목 이름을 입력해주세요.'); return; }
      const priceVal = Number(priceEl.value||0);
      const isFlat = flatEl.checked || name==='공임' || name==='운임';
      const newItem = { id: uid(), name, price:0, priceDate:'', flatRate: isFlat };
      if(priceVal>0){ newItem.price = priceVal; newItem.priceDate = workingDate; }
      state.items.push(newItem);
      state._showAddItem = false;
      await saveState(); render();
    });
    document.querySelectorAll('[data-priceitem]').forEach(inp=>{
      inp.addEventListener('change', async ()=>{
        const it = getItem(inp.dataset.priceitem);
        const v = Number(inp.value||0);
        if(v>0){ it.price=v; it.priceDate=workingDate; await saveState(); render(); }
      });
    });
    document.querySelectorAll('[data-samebtn]').forEach(b=>{
      b.onclick = async ()=>{
        const it = getItem(b.dataset.samebtn);
        it.priceDate = workingDate;
        await saveState(); render();
      };
    });
    document.querySelectorAll('[data-nameitem]').forEach(inp=>{
      inp.addEventListener('change', async ()=>{
        const it = getItem(inp.dataset.nameitem);
        const newName = inp.value.trim();
        if(!newName){ inp.value = it.name; return; }
        it.name = newName;
        if(newName==='공임' || newName==='운임') it.flatRate = true;
        await saveState(); render();
      });
    });
    document.querySelectorAll('[data-delitem]').forEach(b=>{
      b.onclick = async ()=>{
        const it = getItem(b.dataset.delitem);
        const ok = await showConfirm(`'${it?it.name:''}' 품목을 삭제하시겠습니까? 이미 등록된 거래 내역은 그대로 남습니다.`);
        if(!ok) return;
        state.items = state.items.filter(i=>i.id!==b.dataset.delitem);
        await saveState(); render();
      };
    });
  }

  if(activeTab==='clients'){
    document.getElementById('clientsSearchInput')?.addEventListener('input', (e)=>{
      clientsTabSearch = e.target.value; preserveFocusRender();
    });
    document.getElementById('saveClientBtn')?.addEventListener('click', async ()=>{
      const nameEl = document.getElementById('newClientName');
      const favEl = document.getElementById('newClientFav');
      const name = nameEl.value.trim();
      if(!name){ alert('거래처 이름을 입력해주세요.'); return; }
      state.clients.push({ id: uid(), name, favorite: favEl.checked, balance:0 });
      state._showAddForm = false;
      await saveState(); render();
    });
    document.querySelectorAll('[data-fav]').forEach(b=>{
      b.onclick = async ()=>{ const c=getClient(b.dataset.fav); c.favorite=!c.favorite; await saveState(); render(); };
    });
    document.querySelectorAll('[data-delclient]').forEach(b=>{
      b.onclick = async ()=>{
        if(!confirm('이 거래처를 삭제할까요? 거래 내역은 남아있지만 거래처 목록에서 사라집니다.')) return;
        state.clients = state.clients.filter(c=>c.id!==b.dataset.delclient);
        await saveState(); render();
      };
    });

    document.getElementById('backupBtn')?.addEventListener('click', async ()=>{
      const dateStr = realTodayKey();
      const fileName = `샛별수산_백업_${dateStr}.json`;
      const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
      try{
        const file = new File([blob], fileName, { type:'application/json' });
        if(navigator.canShare && navigator.canShare({ files:[file] })){
          await navigator.share({ files:[file], title:'샛별수산 거래장부 백업' });
          return;
        }
      }catch(e){ /* 공유 취소 또는 미지원 - 아래 저장으로 진행 */ }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = fileName; a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById('restoreBtn')?.addEventListener('click', ()=>{
      document.getElementById('restoreFileInput').click();
    });
    document.getElementById('restoreFileInput')?.addEventListener('change', async (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      try{
        const text = await file.text();
        const parsed = JSON.parse(text);
        const ok = await showConfirm('정말 복원하시겠습니까? 현재 저장된 모든 내용이 백업 파일 내용으로 바뀝니다.');
        if(ok){
          state = parsed;
          if(!state.clients) state.clients = [];
          if(!state.items) state.items = [];
          if(!state.tx) state.tx = {};
          if(!state.payments) state.payments = [];
          if(!state.clientMessages) state.clientMessages = {};
          await saveState(); render();
        }
      }catch(err){ alert('백업 파일을 읽을 수 없습니다. 올바른 백업 파일인지 확인해주세요.'); }
      e.target.value = '';
    });
  }

  if(activeTab==='balance'){
    document.getElementById('balanceSearchInput')?.addEventListener('input', (e)=>{
      balanceTabSearch = e.target.value; preserveFocusRender();
    });
    document.querySelectorAll('[data-bmethod]').forEach(b=>{
      b.onclick = ()=>{
        const id = b.dataset.bmethod;
        balanceMethod[id] = b.dataset.mval;
        document.querySelectorAll(`#bmethod-${id} button`).forEach(btn=>{
          btn.classList.toggle('active', btn.dataset.mval===b.dataset.mval);
        });
      };
    });
    document.querySelectorAll('[data-settle]').forEach(b=>{
      b.onclick = async ()=>{
        const id = b.dataset.settle;
        const stampEl = document.getElementById('stamp-'+id);
        stampEl?.classList.add('show');
        setTimeout(async ()=>{
          const c = getClient(id);
          if(c && c.balance>0){
            state.payments.push({ id: uid(), clientId: c.id, amount: c.balance, date: workingDate, type:'full', method: balanceMethod[id]||'cash' });
            c.balance = 0;
          }
          await saveState(); render();
        }, 550);
      };
    });
    document.querySelectorAll('[data-partial]').forEach(b=>{
      b.onclick = async ()=>{
        const id = b.dataset.partial;
        const input = document.getElementById('pay-'+id);
        const amt = Number(input.value||0);
        if(amt<=0){ alert('입금된 금액을 입력해주세요.'); return; }
        const c = getClient(id);
        c.balance = Math.max(0, (c.balance||0) - amt);
        state.payments.push({ id: uid(), clientId: c.id, amount: amt, date: workingDate, type:'partial', method: balanceMethod[id]||'cash' });
        await saveState(); render();
      };
    });
    document.querySelectorAll('[data-undopay]').forEach(b=>{
      b.onclick = async ()=>{
        const ok = await showConfirm('이 입금 처리를 취소하시겠습니까? 미수금이 다시 늘어납니다.');
        if(!ok) return;
        const idx = state.payments.findIndex(p=>p.id===b.dataset.undopay);
        if(idx>-1){
          const p = state.payments[idx];
          const c = getClient(p.clientId);
          if(c){ c.balance = (c.balance||0) + p.amount; }
          state.payments.splice(idx,1);
          await saveState(); render();
        }
      };
    });
  }

  if(activeTab==='statement'){
    document.querySelectorAll('[data-period]').forEach(b=>{
      b.onclick = ()=>{
        const key = b.dataset.period;
        statementPeriod = key;
        if(key==='custom' && !statementCustomStart){
          const [s,e] = periodToRange('1m');
          statementCustomStart = s; statementCustomEnd = e;
        }
        selectedStatementClientId = null;
        render();
      };
    });
    document.getElementById('customStartInput')?.addEventListener('change', (e)=>{
      statementCustomStart = e.target.value; selectedStatementClientId = null; render();
    });
    document.getElementById('customEndInput')?.addEventListener('change', (e)=>{
      statementCustomEnd = e.target.value; selectedStatementClientId = null; render();
    });
    document.querySelectorAll('[data-view]').forEach(b=>{
      b.onclick = ()=>{ statementView = b.dataset.view; selectedStatementClientId = null; render(); };
    });
    document.querySelectorAll('[data-statclient]').forEach(b=>{
      b.onclick = ()=>{ selectedStatementClientId = b.dataset.statclient; render(); };
    });

    document.getElementById('saveMsgBtn')?.addEventListener('click', async ()=>{
      const ta = document.getElementById('clientMsgInput');
      const text = ta.value.trim();
      if(text){ state.clientMessages[selectedStatementClientId] = text; }
      else { delete state.clientMessages[selectedStatementClientId]; }
      await saveState(); render();
    });

    document.getElementById('printBtn')?.addEventListener('click', ()=>{
      window.print();
    });

    async function captureStatement(){
      const el = document.getElementById('statementPrintArea');
      const canvas = await html2canvas(el, { backgroundColor: '#ffffff', scale: 2 });
      return await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    }

    function statementLabel(){
      if(statementView==='summary') return '전체요약';
      const c = getClient(selectedStatementClientId);
      return c ? c.name : '거래처';
    }

    document.getElementById('shareBtn')?.addEventListener('click', async ()=>{
      const btn = document.getElementById('shareBtn');
      btn.disabled = true; btn.textContent = '이미지 만드는 중...';
      try{
        const blob = await captureStatement();
        const fileName = `거래명세서_${statementLabel()}.png`;
        const file = new File([blob], fileName, { type:'image/png' });
        if(navigator.canShare && navigator.canShare({ files:[file] })){
          await navigator.share({ files:[file], title:'샛별수산 거래명세서', text:`${statementLabel()} 거래명세서` });
        } else {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = fileName; a.click();
          URL.revokeObjectURL(url);
          alert('이 기기에서는 바로 공유 창을 열 수 없어 사진으로 저장했습니다. 저장된 사진을 문자나 이메일에 직접 첨부해 보내주세요.');
        }
      } catch(e){
        if(e.name !== 'AbortError') alert('이미지 생성/공유 중 문제가 발생했습니다. 다시 시도해주세요.');
      } finally {
        btn.disabled = false; btn.textContent = '사진으로 문자·이메일 보내기';
      }
    });

    document.getElementById('downloadBtn')?.addEventListener('click', async ()=>{
      const blob = await captureStatement();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = `거래명세서_${statementLabel()}.png`; a.click();
      URL.revokeObjectURL(url);
    });
  }
}

(async function init(){
  await loadState();
  render();
  document.getElementById('workDateInput').addEventListener('change', (e)=>{
    workingDate = e.target.value || realTodayKey();
    selectedClientId = null; cart = []; cartPayMode='credit'; cartPayMethod='cash'; editingTxId = null;
    render();
  });
  document.getElementById('gotoTodayBtn').addEventListener('click', ()=>{
    workingDate = realTodayKey();
    selectedClientId = null; cart = []; cartPayMode='credit'; cartPayMethod='cash'; editingTxId = null;
    render();
  });
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
